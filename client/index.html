<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2d7a4f" />
    <meta name="description" content="CartPath — Safe routes for your golf cart. Navigate on roads ≤35 MPH." />
    <title>CartPath</title>
    <link rel="manifest" href="/manifest.json" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <script>
      // Plausible analytics — only loaded when domain is configured at build time
      (function() {
        var domain = '%VITE_PLAUSIBLE_DOMAIN%';
        if (domain && !domain.startsWith('%')) {
          var s = document.createElement('script');
          s.defer = true;
          s.dataset.domain = domain;
          s.dataset.api = 'https://plausible.io/api/event';
          s.src = 'https://plausible.io/js/script.js';
          document.head.appendChild(s);
          window.plausible = window.plausible || function() {
            (window.plausible.q = window.plausible.q || []).push(arguments);
          };
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

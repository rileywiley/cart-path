services:
  osrm:
    image: osrm/osrm-backend
    platform: linux/amd64
    container_name: cartpath-osrm
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - ../routing/data:/data:ro
    command: osrm-routed --algorithm mld /data/cartpath_roads.osrm
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5000/nearest/v1/driving/0,0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: cartpath-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OSRM_URL=http://osrm:5000
      - CARTPATH_DATA_DIR=/app/pipeline/data
      - CARTPATH_HEALTH_JSON=/app/pipeline/data/health.json
      - CARTPATH_SPEED_DATA=/app/pipeline/data/classified_speeds.json
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
    volumes:
      - ../pipeline/data:/app/pipeline/data:ro
    depends_on:
      osrm:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: cartpath-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

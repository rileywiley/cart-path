services:
  osrm:
    image: osrm/osrm-backend
    platform: linux/amd64
    container_name: cartpath-osrm
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - ../routing/data:/data:ro
    command: osrm-routed --algorithm mld /data/cartpath_roads.osrm
    healthcheck:
      test: ["CMD-SHELL", "osrm-routed --help > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: cartpath-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OSRM_URL=http://osrm:5000
      - CARTPATH_DATA_DIR=/app/pipeline/data
      - CARTPATH_HEALTH_JSON=/app/pipeline/data/health.json
      - CARTPATH_SPEED_DATA=/app/pipeline/data/classified_speeds.json
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - CARTPATH_JWT_SECRET=${CARTPATH_JWT_SECRET}
      - CARTPATH_DB_PATH=/app/pipeline/data/cartpath.db
      - CARTPATH_ENV=${CARTPATH_ENV:-development}
      - CARTPATH_SMTP_HOST=${CARTPATH_SMTP_HOST:-}
      - CARTPATH_SMTP_PORT=${CARTPATH_SMTP_PORT:-587}
      - CARTPATH_SMTP_USER=${CARTPATH_SMTP_USER:-}
      - CARTPATH_SMTP_PASSWORD=${CARTPATH_SMTP_PASSWORD:-}
      - CARTPATH_FROM_EMAIL=${CARTPATH_FROM_EMAIL:-noreply@cartpath.app}
    volumes:
      - ../pipeline/data:/app/pipeline/data:rw
    depends_on:
      osrm:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: cartpath-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../client/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
